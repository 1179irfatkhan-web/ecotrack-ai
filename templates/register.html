```html
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f172a, #1e293b, #10b981);
            font-family: 'Segoe UI', sans-serif;
        }

        .register-card {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 35px;
            color: white;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .logo {
            width: 85px;
            height: 85px;
            background: white;
            color: #10b981;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: auto;
            font-size: 35px;
            margin-bottom: 20px;
        }

        h2 {
            text-align: center;
            font-weight: 700;
            margin-bottom: 25px;
        }

        .form-control {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            padding: 12px;
        }

        .form-control:focus {
            background: rgba(255,255,255,0.2);
            color: white;
            box-shadow: none;
            border: 1px solid #10b981;
        }

        .btn-register {
            background: #10b981;
            border: none;
            padding: 12px;
            font-weight: 600;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn-register:hover {
            background: #059669;
            transform: translateY(-2px);
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            color: #ddd;
        }

        a {
            color: #6ee7b7;
            text-decoration: none;
        }

        a:hover {
            color: white;
        }

        label {
            margin-bottom: 5px;
            font-weight: 500;
        }

        .welcome-text {
            text-align: center;
            color: #d1fae5;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <div class="register-card">

        <div class="logo">
            <i class="fas fa-user-plus"></i>
        </div>

        <h2>Create Account</h2>

        <p class="welcome-text">
            Join our community and start your journey today 🚀
        </p>

        <form method="POST">
            {% csrf_token %}

            {% if form.errors %}

<div class="alert alert-danger">

    {{ form.errors }}

</div>

{% endif %}

{{ form.as_p }}

            <button type="submit" class="btn btn-register w-100">
                <i class="fas fa-user-check me-2"></i>
                Register
            </button>
        </form>

        <div class="divider">
            ─── OR ───
        </div>

        <div class="text-center">
            <p class="mb-0">Already have an account?</p>

            <a href="/login/">
                <i class="fas fa-sign-in-alt me-1"></i>
                Login Here
            </a>
        </div>

    </div>

</body>

</html>
```
