```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

    <style>
        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#1e293b,#0ea5e9);
            font-family:'Segoe UI',sans-serif;
        }

        .login-card{
            width:100%;
            max-width:420px;
            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(15px);
            border:1px solid rgba(255,255,255,0.2);
            border-radius:20px;
            padding:35px;
            color:white;
            box-shadow:0 8px 32px rgba(0,0,0,0.3);
        }

        .logo{
            width:80px;
            height:80px;
            background:white;
            color:#0ea5e9;
            border-radius:50%;
            display:flex;
            justify-content:center;
            align-items:center;
            margin:auto;
            font-size:32px;
            margin-bottom:20px;
        }

        h2{
            text-align:center;
            font-weight:700;
            margin-bottom:25px;
        }

        .form-control{
            background:rgba(255,255,255,0.15);
            border:none;
            color:white;
            padding:12px;
        }

        .form-control:focus{
            background:rgba(255,255,255,0.2);
            color:white;
            box-shadow:none;
            border:1px solid #38bdf8;
        }

        .btn-login{
            background:#0ea5e9;
            border:none;
            padding:12px;
            font-weight:600;
            border-radius:10px;
            transition:0.3s;
        }

        .btn-login:hover{
            background:#0284c7;
            transform:translateY(-2px);
        }

        a{
            color:#7dd3fc;
            text-decoration:none;
        }

        a:hover{
            color:white;
        }

        .divider{
            text-align:center;
            margin:20px 0;
            color:#ddd;
        }

        label{
            margin-bottom:5px;
            font-weight:500;
        }
    </style>
</head>

<body>

<div class="login-card">

    <div class="logo">
        <i class="fas fa-user"></i>
    </div>

    <h2>Welcome Back</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-login w-100">
            <i class="fas fa-sign-in-alt me-2"></i> Login
        </button>
    </form>

    <div class="divider">
        ─── OR ───
    </div>

    <div class="text-center">
        <p class="mb-0">
            Don't have an account?
        </p>
        <a href="/register/">
            Create New Account
        </a>
    </div>

</div>

</body>
</html>
```
